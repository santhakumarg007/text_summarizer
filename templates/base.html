<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Text Summarizer{% endblock %}</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #09090b;
            --glass-bg: rgba(24, 24, 27, 0.6);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-main: #f4f4f5;
            --text-muted: #a1a1aa;
            
            --accent-1: #f71515;
            --accent-2: #5e3eeb;
            --accent-3: #5fda2f;
            --vibrant-gradient: linear-gradient(135deg, var(--accent-1), var(--accent-2), var(--accent-3));
        }

        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--bg-dark);
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(59, 130, 246, 0.12), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(236, 72, 153, 0.12), transparent 25%),
                radial-gradient(circle at 50% 80%, rgba(139, 92, 246, 0.12), transparent 25%);
            background-attachment: fixed;
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Navbar */
        nav {
            background: rgba(9, 9, 11, 0.8);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--glass-border);
            padding: 15px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        
        .nav-brand {
            font-size: 20px;
            font-weight: 800;
            text-decoration: none;
            background: var(--vibrant-gradient);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .nav-links {
            display: flex;
            gap: 25px;
            align-items: center;
        }

        .nav-links a {
            color: var(--text-muted);
            text-decoration: none;
            font-weight: 500;
            font-size: 14px;
            transition: color 0.2s;
        }

        .nav-links a:hover {
            color: var(--text-main);
        }
        
        .nav-btn {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            padding: 8px 16px;
            border-radius: 8px;
            color: white !important;
        }

        .nav-btn.primary {
            background: var(--vibrant-gradient);
            border: none;
        }

        /* Main Wrapper */
        main {
            flex: 1;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        /* Shared Container styling (from previous frontend) */
        .container {
            width: 100%;
            max-width: 800px;
            background: var(--glass-bg);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.6);
            position: relative;
            overflow: hidden;
        }
        
        .container::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; height: 3px;
            background: var(--vibrant-gradient);
            z-index: 10;
        }
        
        /* Custom scrollbar */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-dark); }
        ::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #52525b; }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>

    <nav>
        <a href="/" class="nav-brand">AI Text Summarizer and Insight Extractor</a>
        <div class="nav-links">
            <a href="/">Home</a>
            <a href="/features">Features</a>
            <a href="/about">About</a>
            <a href="/contact">Contact</a>
            {% if user %}
                <a href="/dashboard" class="nav-btn primary">Dashboard</a>
                <a href="/logout">Logout</a>
            {% else %}
                <a href="/login" class="nav-btn">Login</a>
                <a href="/register" class="nav-btn primary">Get Started</a>
            {% endif %}
        </div>
    </nav>

    <main>
        {% block content %}{% endblock %}
    </main>

    {% block extra_js %}{% endblock %}
</body>
</html>
