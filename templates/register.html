{% extends "base.html" %}

{% block title %}Register | AI Intelligence{% endblock %}

{% block extra_css %}
<style>
    .auth-form {
        display: flex;
        flex-direction: column;
        gap: 20px;
    }
    
    input {
        width: 100%;
        padding: 14px 16px;
        background: rgba(0, 0, 0, 0.25);
        border: 1px solid var(--glass-border);
        border-radius: 12px;
        font-family: inherit;
        font-size: 15px;
        color: var(--text-main);
        transition: all 0.3s ease;
        box-sizing: border-box;
    }
    
    input:focus {
        outline: none;
        border-color: var(--accent-1);
        background: rgba(59, 130, 246, 0.05);
        box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.15);
    }

    button.submit-btn {
        background: var(--vibrant-gradient);
        color: white;
        border: none;
        padding: 14px 28px;
        border-radius: 12px;
        font-size: 15px;
        font-weight: 600;
        cursor: pointer;
        width: 100%;
        margin-top: 10px;
        box-shadow: 0 4px 15px rgba(139, 92, 246, 0.25);
    }
</style>
{% endblock %}

{% block content %}
<div class="container" style="max-width: 450px;">
    <div class="header" style="margin-bottom: 30px;">
        <h2>Create Account</h2>
        <p class="subtitle">Join to start summarizing documents instantly.</p>
    </div>

    <form class="auth-form" action="/api/register" method="POST">
        <div>
            <label style="font-size: 14px; color: var(--text-muted); margin-bottom: 8px; display: block;">Username</label>
            <input type="text" name="username" required>
        </div>
        <div>
            <label style="font-size: 14px; color: var(--text-muted); margin-bottom: 8px; display: block;">Password</label>
            <input type="password" name="password" required>
        </div>
        <button type="submit" class="submit-btn">Register Free Account</button>
    </form>
    
    <p style="text-align: center; margin-top: 25px; font-size: 14px; color: var(--text-muted);">
        Already have an account? <a href="/login" style="color: var(--accent-1); text-decoration: none;">Login</a>
    </p>
</div>
{% endblock %}
