<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Text Summarizer & Insight Extractor</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #09090b; /* Zinc 950 */
            --glass-bg: rgba(24, 24, 27, 0.6);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-main: #f4f4f5;
            --text-muted: #a1a1aa;
            
            /* Vibrant Accents */
            --accent-1: #3b82f6; /* Blue */
            --accent-2: #8b5cf6; /* Purple */
            --accent-3: #ec4899; /* Pink */
            --accent-success: #10b981;
            --accent-error: #ef4444;
            
            --vibrant-gradient: linear-gradient(135deg, var(--accent-1), var(--accent-2), var(--accent-3));
        }

        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 40px 20px;
            background-color: var(--bg-dark);
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(59, 130, 246, 0.12), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(236, 72, 153, 0.12), transparent 25%),
                radial-gradient(circle at 50% 80%, rgba(139, 92, 246, 0.12), transparent 25%);
            background-attachment: fixed;
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        .container {
            width: 100%;
            max-width: 800px;
            background: var(--glass-bg);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.6);
            position: relative;
            overflow: hidden;
        }
        
        /* Glowing top edge */
        .container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: var(--vibrant-gradient);
            z-index: 10;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        h2 {
            font-size: 34px;
            font-weight: 800;
            margin: 0 0 12px 0;
            background: var(--vibrant-gradient);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }

        .subtitle {
            font-size: 16px;
            color: var(--text-muted);
            margin: 0;
            font-weight: 400;
        }

        .section {
            background: rgba(255, 255, 255, 0.02);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 24px;
            border: 1px solid var(--glass-border);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .section:hover {
            transform: translateY(-2px);
            background: rgba(255, 255, 255, 0.035);
            border-color: rgba(255, 255, 255, 0.12);
            box-shadow: 0 10px 30px -10px rgba(0,0,0,0.5);
        }

        h3 {
            font-size: 19px;
            font-weight: 600;
            margin: 0 0 20px 0;
            display: flex;
            align-items: center;
            gap: 12px;
            color: #fff;
        }
        
        h3::before {
            content: '';
            display: inline-block;
            width: 6px;
            height: 24px;
            border-radius: 4px;
            background: var(--vibrant-gradient);
        }

        .file-upload-wrapper {
            position: relative;
            margin-bottom: 20px;
        }

        input[type="file"] {
            width: 100%;
            padding: 16px;
            background: rgba(0, 0, 0, 0.25);
            border: 2px dashed rgba(255, 255, 255, 0.15);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 14px;
            color: var(--text-main);
            box-sizing: border-box;
        }

        input[type="file"]:hover {
            border-color: var(--accent-2);
            background: rgba(139, 92, 246, 0.05);
        }

        input[type="file"]::file-selector-button {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 8px 16px;
            border-radius: 8px;
            margin-right: 16px;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
            font-weight: 500;
        }
        
        input[type="file"]::file-selector-button:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        button {
            background: var(--vibrant-gradient);
            color: white;
            border: none;
            padding: 14px 28px;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: auto;
            min-width: 160px;
            box-shadow: 0 4px 15px rgba(139, 92, 246, 0.25);
            position: relative;
            overflow: hidden;
        }
        
        button::after {
            content: '';
            position: absolute;
            top: 0; left: -100%; width: 50%; height: 100%;
            background: linear-gradient(to right, transparent, rgba(255,255,255,0.25), transparent);
            transform: skewX(-20deg);
            transition: 0.5s;
        }

        button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(236, 72, 153, 0.4);
        }
        
        button:hover:not(:disabled)::after {
            left: 150%;
        }

        button:disabled {
            background: #27272a;
            color: #52525b;
            cursor: not-allowed;
            box-shadow: none;
            border: 1px solid #3f3f46;
        }

        textarea {
            width: 100%;
            min-height: 120px;
            padding: 16px;
            background: rgba(0, 0, 0, 0.25);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            font-family: inherit;
            font-size: 15px;
            color: var(--text-main);
            resize: vertical;
            transition: all 0.3s ease;
            box-sizing: border-box;
            margin-bottom: 20px;
        }

        textarea:focus {
            outline: none;
            border-color: var(--accent-1);
            background: rgba(59, 130, 246, 0.05);
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.15);
        }

        .output-area {
            margin-top: 20px;
            padding: 24px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 12px;
            border-left: 4px solid var(--accent-2);
            font-size: 15px;
            line-height: 1.7;
            white-space: pre-wrap;
            display: none;
            animation: fadeIn 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            color: #e4e4e7;
        }

        .status-text {
            font-size: 14px;
            color: var(--text-muted);
            margin-top: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .spinner {
            width: 18px;
            height: 18px;
            border: 3px solid rgba(255,255,255,0.2);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 0.8s linear infinite;
            display: none;
        }

        button .spinner.active {
            display: inline-block;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .pulse {
            animation: pulse 2s infinite cubic-bezier(0.4, 0, 0.6, 1);
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .disabled-section {
            opacity: 0.5;
            transition: opacity 0.4s ease;
        }

        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: var(--bg-dark); 
        }
        ::-webkit-scrollbar-thumb {
            background: #3f3f46; 
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #52525b; 
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2>AI Document Intelligence</h2>
        <p class="subtitle">Upload a research paper or document to extract summaries and deep insights.</p>
    </div>

    <div class="section">
        <h3>1. Upload Document</h3>
        <div class="file-upload-wrapper">
            <input type="file" id="pdfFile" accept=".pdf">
        </div>
        <button id="uploadBtn" onclick="uploadPDF()">
            <span class="spinner" id="uploadSpinner"></span>
            <span id="uploadBtnText">Upload PDF</span>
        </button>
        <div id="uploadStatus" class="status-text"></div>
    </div>

    <div class="section disabled-section" id="summarySection">
        <h3>2. Executive Summary</h3>
        <button id="summaryBtn" onclick="summarize()" disabled>
            <span class="spinner" id="summarySpinner"></span>
            <span id="summaryBtnText">Generate Summary</span>
        </button>
        <div id="summaryOutput" class="output-area"></div>
    </div>

    <div class="section disabled-section" id="insightsSection">
        <h3>3. Deep Insights (Q&A)</h3>
        <p class="status-text" style="margin-top: 0; margin-bottom: 12px; color: var(--text-main);">Ask specific questions about the document (one per line):</p>
        <textarea id="questions" placeholder="What is the main objective of this study?&#10;What methodology was used?&#10;What are the limitations?" disabled></textarea>
        <button id="insightsBtn" onclick="getInsights()" disabled>
            <span class="spinner" id="insightsSpinner"></span>
            <span id="insightsBtnText">Extract Answers</span>
        </button>
        <div id="answersOutput" class="output-area"></div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
